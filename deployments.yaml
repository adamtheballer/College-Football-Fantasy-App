version: 1
app: college-football-fantasy

canonical_runtime:
  backend:
    framework: fastapi
    source_dir: api
    import_path: collegefootballfantasy_api.app.main:app
    pythonpath: .
    package_manager: uv
    legacy_backends_disabled:
      - web/server
      - web/netlify/functions/api.ts
      - web/vite.config.server.ts
  frontend:
    framework: vite-react
    source_dir: web
    package_manager: npm
    build_output: web/dist/spa

environments:
  dev:
    description: Local development with Docker Postgres, FastAPI, and Vite.
    database:
      engine: postgres
      docker_service: db
      url_env: DATABASE_URL
      default_url: postgresql+psycopg://postgres:postgres@localhost:5433/collegefootballfantasy
      default_host_port: 5433
      container_port: 5432
    api:
      host: 0.0.0.0
      port: 8000
      migrate_before_start: true
      migrate_command: uv run alembic -c api/alembic.ini upgrade head
      verify_migrations_command: PYTHONPATH=. uv run python scripts/check_alembic_head.py
      start_command: PYTHONPATH=. uv run uvicorn collegefootballfantasy_api.app.main:app --host 0.0.0.0 --port 8000
      health_url: http://localhost:8000/health
      readiness_url: http://localhost:8000/health/ready
    web:
      host: 0.0.0.0
      port: 8080
      install_command: npm --prefix web ci
      start_command: npm --prefix web run dev -- --host 0.0.0.0
      url: http://localhost:8080
      env:
        VITE_API_BASE_URL: http://localhost:8000
    cors_origins:
      - http://localhost:5173
      - http://localhost:8080
    required_env:
      - DATABASE_URL
      - JWT_SECRET_KEY
      - UI_BASE_URL
      - CORS_ORIGINS
    verification:
      - PYTHONPATH=. uv run python -c "from collegefootballfantasy_api.app.main import app; print(app.title)"
      - uv run alembic -c api/alembic.ini upgrade head
      - PYTHONPATH=. uv run pytest -q tests
      - npm --prefix web run typecheck
      - npm --prefix web test
      - npm --prefix web run build

  production:
    description: Managed cloud production deployment. Run migrations before promoting the API.
    database:
      engine: postgres
      managed: true
      url_env: DATABASE_URL
      staging_url_secret: STAGING_DATABASE_URL
      production_url_secret: PRODUCTION_DATABASE_URL
      migrations_before_api: true
      backups_required: true
    api:
      process_type: web
      host: 0.0.0.0
      port_env: API_PORT
      build_command: uv sync --frozen
      migrate_command: cd api && PYTHONPATH=.. uv run alembic -c alembic.ini upgrade head
      verify_migrations_command: PYTHONPATH=. uv run python scripts/check_alembic_head.py
      start_command: PYTHONPATH=. uv run uvicorn collegefootballfantasy_api.app.main:app --host 0.0.0.0 --port ${API_PORT:-8000}
      health_path: /health
      readiness_path: /health/ready
      promotion_order:
        - build_artifact
        - run_database_migrations
        - verify_alembic_head
        - start_or_promote_api
        - require_health_ready
    web:
      process_type: static
      build_command: npm --prefix web ci && npm --prefix web run build
      static_output: web/dist/spa
      env:
        VITE_API_BASE_URL: ${PUBLIC_API_BASE_URL}
    workers:
      trade_processor:
        enabled: false
        command: PYTHONPATH=. uv run python scripts/process_due_trades.py --limit 100
        note: Enable only after the trade worker is deployed as a trusted scheduled process.
    required_env:
      - DATABASE_URL
      - JWT_SECRET_KEY
      - ENVIRONMENT
      - CORS_ORIGINS
      - UI_BASE_URL
      - PUBLIC_API_BASE_URL
      - VITE_API_BASE_URL
      - REFRESH_COOKIE_SECURE
      - REFRESH_COOKIE_SAMESITE
    optional_env:
      - CORS_ORIGIN_REGEX
      - SPORTSDATA_API_KEY
      - SPORTSDATA_ENABLED
    safety_gates:
      environment_must_equal: production
      reject_default_jwt_secret: true
      cors_origins_must_be_explicit: true
      cors_origin_regex_must_be_unset_or_production_safe: true
      refresh_cookie_secure_must_be_true: true
      migrations_before_api: true
      verify_alembic_head_before_promotion: true
      require_health_ready_before_traffic: true
      no_express_backend: true
      no_localhost_public_urls: true
