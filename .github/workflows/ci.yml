name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: collegefootballfantasy
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d collegefootballfantasy"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/collegefootballfantasy
      PYTHONPATH: .
      JWT_SECRET_KEY: ci-only-secret
      UI_BASE_URL: http://localhost:8080
      CORS_ORIGINS: http://localhost:8080
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: uv sync

      - name: FastAPI import smoke
        run: PYTHONPATH=. uv run python -c "from collegefootballfantasy_api.app.main import app; print(app.title)"

      - name: Run Alembic migrations
        run: uv run alembic -c api/alembic.ini upgrade head

      - name: Verify database is at Alembic head
        run: PYTHONPATH=. uv run python scripts/check_alembic_head.py

      - name: Run backend tests
        run: PYTHONPATH=. uv run pytest -q tests

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix web ci

      - name: Typecheck frontend
        run: npm --prefix web run typecheck

      - name: Test frontend
        run: npm --prefix web test

      - name: Build frontend
        run: npm --prefix web run build
