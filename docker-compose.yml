services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: collegefootballfantasy
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d collegefootballfantasy"]
      interval: 5s
      timeout: 5s
      retries: 20
  api:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./:/app
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/collegefootballfantasy
      API_HOST: 0.0.0.0
      API_PORT: 8000
      API_LOG_LEVEL: info
      UI_BASE_URL: http://localhost:8080
      UV_PROJECT_ENVIRONMENT: /tmp/cff-api-venv
      PYTHONPATH: /app
    ports:
      - "${API_PORT:-8000}:8000"
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    command: >-
      sh -c "pip install uv && uv sync && cd api && PYTHONPATH=/app uv run alembic -c alembic.ini upgrade head && cd /app && uv run uvicorn collegefootballfantasy_api.app.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready', timeout=3)",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 90s
  web:
    image: node:20
    working_dir: /app/web
    volumes:
      - ./:/app
      - /app/web/node_modules
    ports:
      - "${WEB_PORT:-8080}:8080"
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    command: >-
      sh -c "npm ci && npm run dev:vite -- --host 0.0.0.0"

volumes:
  pgdata:
