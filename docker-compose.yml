services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: collegefootballfantasy
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  api:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./:/app
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/collegefootballfantasy
      API_HOST: 0.0.0.0
      API_PORT: 8000
      API_LOG_LEVEL: info
      UV_PROJECT_ENVIRONMENT: /tmp/cff-api-venv
    ports:
      - "8000:8000"
    depends_on:
      - db
    command: >-
      sh -c "pip install uv && uv sync && uv run uvicorn api.app.main:app --host 0.0.0.0 --port 8000"
  web:
    image: node:20
    working_dir: /app/web
    volumes:
      - ./:/app
    ports:
      - "8080:8080"
    depends_on:
      - api
    command: >-
      sh -c "npm install && npm run dev -- --host 0.0.0.0"

volumes:
  pgdata:
